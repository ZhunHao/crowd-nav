name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        # .[test] installs PyQt5, pytest-qt, pytest, pylint, and Pillow
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3"
          (cd Python-RVO2-main && python setup.py build && python setup.py install)
          pip install -e ".[test]"
          pip install "gym==0.15.7"

      - name: Preflight
        run: crowdnav-preflight

      - name: Fast tests
        run: pytest -v -m "not slow and not smoke"

      - name: All smoke tests (R1 + WP-3 + WP-4 + WP-5 GUI, headless)
        env:
          MPLBACKEND: Agg
          QT_QPA_PLATFORM: offscreen
        run: pytest -v -m "smoke"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-outputs
          path: |
            exports/baseline.mp4
            exports/wp3_smoke.mp4
            exports/wp4_smoke.mp4
          if-no-files-found: warn
